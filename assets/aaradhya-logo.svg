<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E07B00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- A shape in orange -->
  <polygon points="30,65 50,15 70,65" fill="none" stroke="url(#aGrad)" stroke-width="8" stroke-linejoin="round"/>
  <line x1="38" y1="47" x2="62" y2="47" stroke="url(#aGrad)" stroke-width="8"/>
  <!-- Leaf overlapping right side of A -->
  <ellipse cx="68" cy="35" rx="12" ry="22" fill="url(#leafGrad)" transform="rotate(-15 68 35)" opacity="0.9"/>
  <ellipse cx="68" cy="35" rx="5" ry="20" fill="none" stroke="#1B5E20" stroke-width="1.5" transform="rotate(-15 68 35)"/>
  <!-- Company Name -->
  <text x="90" y="38" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#1B5E20" letter-spacing="1">AARADHYA ENVIRO</text>
  <!-- Divider line -->
  <line x1="90" y1="45" x2="292" y2="45" stroke="#8B0000" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="90" y="62" font-family="Arial" font-size="12" fill="#8B0000" letter-spacing="0.5">Environmental Consultancy &amp; Services</text>
</svg>